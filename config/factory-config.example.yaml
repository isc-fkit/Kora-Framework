# Copy thành factory-config.yaml khi setup. File factory-config.yaml là DATA của user (gitignore).
# Cấu hình AI Product Factory — được điền tự động khi user chạy "@khởi tạo dự án".
# Giá trị TODO nghĩa là CHƯA setup → Claude phải đề nghị user chạy setup trước.

setup_completed: false
setup_date: TODO

project_name: TODO
language: vi              # ngôn ngữ tài liệu

domain:
  # CHỌN NHIỀU domain được — preset = chuỗi NỐI PHẨY (rule sẽ GỘP từ tất cả).
  preset: TODO            # vd "healthcare, telecom" — các slug: healthcare | fintech | banking | insurance |
                          # ecommerce | retail | manufacturing | logistics | telecom | education | government |
                          # hr | saas | real-estate | generic
  description: TODO       # tên các domain đã chọn (để hiển thị)
  rules_file: config/domain-rules.md   # file rule GỘP từ các preset đã chọn (xem workflows/00-setup.md §Gộp rule đa-domain)

knowledge_base:
  vault_path: Project_Name_Brain
  indexer: tools/kb-indexer/build_index.py   # tự dựng index/graph/health (chạy sau mỗi ghi)
  stale_days: 60                              # ngưỡng tài liệu "lỗi thời" trong health report
  evolve_schedule: none                       # none | <cron> — lịch chạy workflow 09 (tùy chọn)   # vault Obsidian — 'bộ não' tri thức. Setup tự đổi theo tên project: <TênProject>_Brain
  docs_path: docs
  # Cấu trúc thư mục vault — user đổi tên được lúc setup, workflow + script đọc từ đây
  vault_structure:
    index: 00_Index
    projects: 01_Projects
    epics: 02_Epics
    user_stories: 03_UserStories
    tasks: 04_Tasks
    bugs: 05_Bugs
    subtasks: 06_SubTasks
    business_rules: 04_BusinessRules
    acceptance_criteria: 05_AcceptanceCriteria
    features: 06_Features
    decisions: 07_Decisions
    raw_issues: 08_RawIssues
    system: _system

jira:
  enabled: false          # true nếu user chọn quét Jira lúc setup
  type: auto              # auto | cloud | server — cloud (*.atlassian.net, MCP/token) | server (self-host, token-only)
  effort_field: ""        # custom field "ước tính theo giờ" gộp vào est khi thiếu time-tracking (vd FMC: customfield_10867)
  complexity_field: ""    # custom field "Complexity" (độ phức tạp, số). Rỗng → tự dò field tên "Complexity". Ghi frontmatter `complexity`.
  complexity_high: 7      # ngưỡng PHỨC TẠP CAO (>= ngưỡng = cao) — báo cáo lấy nhóm này làm trọng tâm
  tool_path: tools/jira-to-obsidian
  group_by_project: true  # mỗi project Jira 1 thư mục con trong vault (hỏi lúc setup)
  run_mode: auto          # auto = thử sandbox trước | sandbox | user_terminal (tự ghi sau lần chạy đầu)
  import_status: none     # none | pending_user_run | done — trạng thái lần import gần nhất
  scheduled_sync: none    # none | <cron + task_id> — lịch tự đồng bộ --since (workflow 08)
  user_os: TODO           # macos | windows | linux — xác định lúc setup, để sinh lệnh đúng OS
  # Cấu hình kết nối nằm trong tools/jira-to-obsidian/.env.local (KHÔNG ghi token vào đây)

# ─────────────────────────────────────────────────────────────────────────────
# connections: SỔ ĐĂNG KÝ nguồn tri thức đã kết nối. KHÔNG chứa secret — chỉ TRỎ tới
# nơi secret nằm (env var trong ~/.zshrc / file .env / tên MCP connector).
# /claude-knowledge-connect GHI vào đây; /claude-knowledge-scan và /claude-knowledge-schedule ĐỌC để liệt kê nguồn.
# QUY TẮC ID: <source_type>__<method>[__<slug-host>]. Cùng loại nhưng MCP vs API =
# 2 entry RIÊNG (id khác nhau) → đếm/hiển thị tách biệt.
#   source_type: jira_server|jira_cloud|confluence|github|gitlab|sharepoint|outlook|gmail|gmail_smtp|m365|excel|sheet
#                (gmail = MCP tạo nháp/draft; gmail_smtp = SMTP App Password TỰ ĐỘNG GỬI — khác nhau)
#   method:      mcp | api | smtp      auth_kind: oauth2 | token | mcp_oauth | app_password
#   creds.kind:  mcp_connector (connector name) | env (biến ~/.zshrc) | dotenv (file .env)
#   status:      connected | disconnected | error | unconfigured
# Ví dụ (xóa khi setup thật):
#   - id: jira_cloud__api
#     method: api
#     source_type: jira_cloud
#     display_name: "Jira Cloud (API)"
#     auth_kind: oauth2
#     base_url: "https://team.atlassian.net"
#     creds:
#       kind: dotenv
#       dotenv_path: tools/jira-to-obsidian/.env.cloud
#       env_keys: [JIRA_EMAIL, JIRA_PAT]
#       oauth: { flow: device, token_env: JIRA_OAUTH_TOKEN, headless_fallback: pat }
#     verify: { probe: "GET /rest/api/2/myself" }
#     status: connected
#     last_checked: "2026-06-19T08:00:00+07:00"
#     last_error: ""
#   - id: gmail_smtp__smtp           # Gmail TỰ ĐỘNG GỬI (App Password) — báo cáo/lịch nền tự bắn mail
#     method: smtp
#     source_type: gmail_smtp
#     display_name: "Gmail SMTP (App Password — auto-send)"
#     auth_kind: app_password
#     creds: { kind: dotenv, dotenv_path: tools/report-mailer/.env.local, env_keys: [SMTP_USER, SMTP_PASS] }
#     verify: { probe: "send_report.py --check" }
#     status: connected
#   - id: excel__local               # Bảng task .xlsx LOCAL → gộp vào báo cáo như Jira (tương tác)
#     method: local_file
#     source_type: excel
#     display_name: "Excel kế hoạch (local)"
#     file_path: "data/ke-hoach.xlsx"   # tương đối project hoặc tuyệt đối
#     sheet_name: "Tasks"                # bỏ trống = sheet đầu
#     status: configured
#   - id: sheet__mcp                  # Google Sheet / SharePoint qua MCP Cowork (Claude lấy rows → import --from-rows)
#     method: mcp
#     source_type: sheet
#     display_name: "Google Sheet kế hoạch Q2"
#     creds: { kind: mcp_connector, connector_name: "google-sheets" }   # hoặc "sharepoint"/"microsoft-365"
#     status: connected
# ─────────────────────────────────────────────────────────────────────────────
connections: []

# Mapping cột Excel/Sheet → field báo cáo (TÙY CHỌN — import_excel.py tự nhận tên cột phổ biến Việt/Anh).
# Chỉ khai khi tên cột của bạn KHÁC mặc định. Dạng {header_thật: field_đích}. Field đích hợp lệ:
#   excel_key, summary, type, status, status_category, assignee, reporter, project, story_points,
#   complexity, estimate_hours, spent_hours, remaining_hours, duedate, sprint_name, sprint_state, sprint_end, updated
# excel:
#   map:
#     "Mã CV": excel_key
#     "Nội dung": summary
#     "Phụ trách": assignee
#     "Điểm": story_points

code:
  enabled: false          # true nếu có repo code kết nối
  repo_path: ""

reports:                  # Báo cáo tiến độ (workflow 14) — sinh local từ vault, KHÔNG server
  output_dir: reports     # thư mục xuất dashboard HTML + JSON (DATA, gitignore)
  scheduled: none         # none | <cron + task_id> — 8:00 tự làm mới→report (workflow 08 mục B)
  stale_after_days: 1     # tri thức "cũ" nếu mốc cập nhật cuối cách hôm nay >= N ngày → banner + nhắc làm mới
  refresh_source: auto    # auto | mcp | token | none — cách làm mới trước khi report (Cloud=mcp, self-host=token)
  qc_members: []          # tên QC/tester, vd ["Nguyen Van A","Tran Thi B"] — ÉP vai trò QC: KHÔNG đo bằng giờ-công (họ report bug, không logtime / join cuối sprint) → đo bằng SỐ BUG TẠO. Rỗng → tự nhận diện (0 logtime + là reporter của Bug).
  email:                  # Gửi báo cáo qua email (workflow 14 Bước 2.7 / lịch 08). Bí mật ở tools/report-mailer/.env.local
    enabled: false        # true để bật gửi mail sau khi sinh report
    method: smtp          # ƯU TIÊN: smtp (TỰ ĐỘNG GỬI qua send_report.py — Gmail dùng App Password, smtp.gmail.com:587). gmail_draft (tạo nháp, bấm tay) = FALLBACK.
    provider: smtp        # smtp (auto-send, gồm Gmail app-password) | gmail | outlook. Gmail app-password → để 'smtp' (auto), KHÔNG phải draft.
    # transport: auto     # (tuỳ chọn) auto|smtp|https — auto = SMTP rồi TỰ fallback Gmail API/HTTPS khi mạng chặn SMTP (cần GMAIL_OAUTH_* + HTTPS_PROXY ở .env.local; xem tools/report-mailer/README.md).
    to: []                # danh sách email nhận, vd ["a@x.com","b@y.com"]
    recipients: []        # danh bạ người nhận lưu sẵn để chọn nhanh trong /claude-knowledge-send-mail & /claude-knowledge-schedule
    cc: []
    subject: "Báo cáo tiến độ {date}"   # {date} thay bằng ngày khi gửi
    banner_url: "https://raw.githubusercontent.com/isc-fkit/Kora-Framework/main/assets/banner-daily-report.jpg"   # banner header email (ảnh PUBLIC: raw GitHub / Pages). Rỗng → build_report tự dùng URL main này.
    attach_html: true     # đính kèm file progress-report-latest.html (ngoài việc nhúng nội dung)
  # status_map (tùy chọn): map trạng thái Jira → nhóm done/in_progress/todo. Để trống = đoán theo từ khóa.
  # status_map:
  #   done: ["Done", "Closed", "Đã xong"]
  #   in_progress: ["In Progress", "In Review", "Đang làm"]
  #   todo: ["To Do", "Backlog", "Chưa làm"]

confluence:               # KB ĐÁM MÂY CHUNG — gom tri thức rồi ĐẨY (post) lên 1 nơi chung Confluence.
  enabled: false          # true khi đã kết nối + chọn đẩy lên Confluence
  tool_path: tools/confluence-sync
  base_url: ""            # https://<domain>.atlassian.net/wiki  (secret ở tools/confluence-sync/.env.local)
  auth: auto              # auto | oauth | token  — auto: có .oauth-token.json → oauth, elif token → Basic
  permission: read_write  # read_only | read_write — read_only thì --push bị từ chối
  space_key: ""           # space đích trong cloud KB chung
  parent_page_id: ""      # mọi trang upsert nằm dưới page cha này (1 nơi chung)
  user_os: TODO           # macos | windows | linux — sinh lệnh đúng OS
  push:
    source: both          # vault | docs | both  — nguồn note để đẩy lên
    scope: ""             # lọc theo thư mục/glob (tùy chọn)
    on_conflict: skip_human_edited   # skip_human_edited | overwrite — trang bị người sửa tay thì bỏ qua
  pull:
    into: ""              # "" = kéo vào vault (được index tự động) | đường dẫn khác
    since: auto           # auto (theo mốc) | <ngày> | full
  scheduled: none         # none | "<cron> | <task_id>" — lịch get&post (workflow 08 / scheduler)

github:                   # KB → repo GitHub RIÊNG TƯ (private) qua GIT PUSH. Token CHỈ ở tools/github-sync/.env.local.
  enabled: false          # true khi đã cấu hình repo + có token
  tool_path: tools/github-sync
  repo: ""                # owner/name, vd "isc-fkit/kb-mirror" — repo PHẢI private
  branch: main
  base_url: https://github.com   # đổi cho GitHub Enterprise (vd https://git.cty.vn)
  permission: read_write  # read_only | read_write — read_only thì --push bị từ chối
  push:
    source: both          # vault | docs | both — nguồn note để đẩy
    scope: ""             # lọc theo thư mục/glob (tùy chọn)
    subdir: ""            # thư mục con trong repo đích (mặc định = gốc repo)
  # Token: KORA_GITHUB_SYNC_TOKEN (PAT scope 'repo') trong tools/github-sync/.env.local

gitlab:                   # KB → repo GitLab RIÊNG TƯ (private) qua GIT PUSH. Token CHỈ ở tools/gitlab-sync/.env.local.
  enabled: false          # true khi đã cấu hình repo + có token
  tool_path: tools/gitlab-sync
  repo: ""                # group/name, vd "isc-fkit/kb-mirror" (nhóm con: "group/sub/name") — repo PHẢI private
  branch: main
  base_url: https://gitlab.com   # đổi cho GitLab self-hosted (vd https://gitlab.cty.vn)
  permission: read_write  # read_only | read_write — read_only thì --push bị từ chối
  push:
    source: both          # vault | docs | both — nguồn note để đẩy
    scope: ""             # lọc theo thư mục/glob (tùy chọn)
    subdir: ""            # thư mục con trong repo đích (mặc định = gốc repo)
  # Token: KORA_GITLAB_SYNC_TOKEN (PAT scope 'api' hoặc read_repository+write_repository) trong tools/gitlab-sync/.env.local

sharepoint:               # KB → SharePoint document library qua Microsoft Graph (WRITE). Token ở ~/.zshrc hoặc tools/sharepoint-sync/.env.local (lịch nền).
  enabled: false          # true khi đã kết nối SharePoint + chọn đẩy lên
  tool_path: tools/sharepoint-sync
  base_url: ""            # https://<tenant>.sharepoint.com
  site_name: ""           # tên site, vd "FTEL_Medicare"
  library: ""             # tên thư viện tài liệu, vd "Knowledge Base" (rỗng = thư viện mặc định)
  drive_id: ""            # override trực tiếp drive id (nếu biết) — bỏ trống thì tự resolve theo library
  auth: auto              # auto | client_credentials (app-only, chạy nền) | device (delegated, tương tác)
  permission: read_write  # read_only | read_write — read_only thì --push bị từ chối
  push:
    source: both          # vault | docs | both — nguồn note để đẩy
    scope: ""             # lọc theo thư mục/glob (tùy chọn)
    subdir: ""            # thư mục con trong thư viện đích (mặc định = gốc)
  pull:
    into: ""              # "" = kéo vào <vault>/SharePoint/ | đường dẫn khác
    subdir: ""            # thư mục con trong thư viện để kéo (mặc định = gốc)
  scheduled: none         # none | "<cron> | <task_id>"
  # Token: SHAREPOINT_TENANT_ID + SHAREPOINT_CLIENT_ID + SHAREPOINT_CLIENT_SECRET (app-only, admin consent
  # Sites.ReadWrite.All) ở ~/.zshrc (ưu tiên) hoặc tools/sharepoint-sync/.env.local (lịch nền); hoặc --login device-flow.

sync:                     # Cấu hình chung cho /claude-knowledge-sync (đẩy KB lên target đã kết nối). CÓ CỔNG MẬT KHẨU vận hành.
  password_required: true # bắt buộc nhập KORA_OPS_PW trước khi đẩy (KHÔNG áp cho /claude-knowledge-export-*)
  targets: [confluence, github, sharepoint]   # target khả dụng; chọn lúc chạy
  versioning:             # 1 US cũ có "change request" mới → GIỮ US cũ + đánh dấu superseded + link CR
    cr_link_types: ["supersedes", "is superseded by", "clones", "is cloned by", "relates"]
    cr_issue_types: ["Change Request", "Thay đổi yêu cầu"]
    mark_old: superseded  # nhãn ghi vào US cũ

cloud_kb:                 # Kết nối KB CHUNG cho gói export (user import dùng). Phân biệt key READ vs WRITE.
  enabled: false
  base_url: ""            # https://<org>.atlassian.net/wiki  (= confluence.base_url thường)
  space: ""               # space của KB chung
  permission: read-write  # read-write | read-only — mirror package.permission; --push cần read-write
  # Key READ  → tools/confluence-sync/.env.local (SHIP trong archive cho mọi user) — chỉ GET.
  # Key WRITE (KORA_CLOUD_WRITE_*) → cấp NGOÀI luồng cho user có quyền, KHÔNG vào config/zip/git.
  sync:
    enabled: false        # gói "user" đặt true để tự lên lịch get&post
    mode: pull            # pull | pull-push (tự hạ xuống pull nếu không có key write)
    scheduled: none       # none | "<cron> | <task_id>"

scheduler:                # LỊCH cấp HỆ ĐIỀU HÀNH — chạy đúng giờ kể cả khi ĐÓNG app Claude.
  enabled: false
  engine: auto            # auto | launchd (macOS) | cron (Linux) | schtasks (Windows)
  user_os: TODO           # macos | linux | windows — phát hiện lúc register
  python: auto            # auto | <đường dẫn tuyệt đối> — cron KHÔNG có PATH nên resolve tuyệt đối
  log_dir: reports/scheduler-logs
  # Mail CẢNH BÁO SỰ CỐ (ticket sự cố) khi lịch nền lỗi — cấu hình tập trung qua /claude-knowledge-alert-mail.
  error_recipients: []    # người nhận mail sự cố. != rỗng → OVERRIDE người nhận của MỌI lịch (đọc lúc chạy); rỗng = dùng email từng lịch → fallback reports.email.to
  error_email:
    enabled: true         # bật/tắt GỬI mail sự cố cho mọi lịch (tắt vẫn có thể tạo ticket)
  ticket_issue:
    enabled: true         # lỗi trong lịch → tạo ticket sự cố
    target: confluence    # confluence | jira | none
    space_key: ""         # nếu target=confluence
    jira_project: ""      # nếu target=jira
  ai_risk_analysis:
    mode: auto            # auto | claude_cli | off — auto: có 'claude' bin thì chạy headless, không thì bỏ qua
    claude_bin: auto      # auto | <đường dẫn tuyệt đối>
    skip_permissions: true  # true → thêm --dangerously-skip-permissions cho `claude -p` (headless/cron KHÔNG kẹt prompt quyền). false → bỏ cờ.
  # schedules thật nằm ở tools/kora-scheduler/schedules.json (gitignore); block này chỉ là cấu hình chung.

package:                  # Gói cài đặt này là HOST hay USER (gói export bàn giao)?
  type: host              # host | user — user: tắt report/mail, tự lên lịch get&post (xem cloud_kb.sync)
  permission: read-write  # read-write | read-only — quyền với KB chung
